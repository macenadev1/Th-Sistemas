<!-- Modal de Seleção de Forma de Pagamento -->
<div id="formaPagamentoModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h2 style="text-align: center; font-size: 28px;">💳 Selecione a Forma de Pagamento</h2>
            <p id="valorSelecionadoTexto" style="text-align: center; font-size: 24px; color: #667eea; font-weight: bold; margin-top: 10px;">Valor: R$ 0,00</p>
            <p style="text-align: center; font-size: 14px; color: #666; margin-top: 8px;">Defina bandeira e parcelas abaixo. Depois selecione a forma com 1, 2, 3 ou 4.</p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 10px 20px;">
            <div>
                <label for="bandeiraCartaoPagamento" style="display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: bold;">Bandeira cartão</label>
                <select id="bandeiraCartaoPagamento" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px;">
                    <option value="visa">VISA</option>
                    <option value="master">MASTERCARD</option>
                    <option value="elo">ELO</option>
                    <option value="amex">AMEX</option>
                    <option value="hipercard">HIPERCARD</option>
                    <option value="outra">OUTRA</option>
                </select>
            </div>
            <div>
                <label for="parcelasCartaoPagamento" style="display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: bold;">Parcelas (crédito)</label>
                <input id="parcelasCartaoPagamento" type="number" min="1" max="12" value="1" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px;">
            </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px;">
            <!-- Dinheiro - Tecla 1 -->
            <button type="button" onclick="selecionarFormaPagamentoComValor('dinheiro')" style="
                padding: 30px;
                border: 4px solid #28a745;
                background: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 18px;
                font-weight: bold;
                transition: all 0.2s;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            " onmouseover="this.style.background='#28a745'; this.style.color='white'" onmouseout="this.style.background='white'; this.style.color='#000'">
                <span style="font-size: 48px;">💵</span>
                <span style="font-size: 20px;">DINHEIRO</span>
                <span style="font-size: 16px; background: #28a745; color: white; padding: 8px 16px; border-radius: 6px;">Tecla 1</span>
            </button>

            <!-- Débito - Tecla 2 -->
            <button type="button" onclick="selecionarFormaPagamentoComValor('debito')" style="
                padding: 30px;
                border: 4px solid #007bff;
                background: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 18px;
                font-weight: bold;
                transition: all 0.2s;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            " onmouseover="this.style.background='#007bff'; this.style.color='white'" onmouseout="this.style.background='white'; this.style.color='#000'">
                <span style="font-size: 48px;">💳</span>
                <span style="font-size: 20px;">DÉBITO</span>
                <span style="font-size: 16px; background: #007bff; color: white; padding: 8px 16px; border-radius: 6px;">Tecla 2</span>
            </button>

            <!-- Crédito - Tecla 3 -->
            <button type="button" onclick="selecionarFormaPagamentoComValor('credito')" style="
                padding: 30px;
                border: 4px solid #ffc107;
                background: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 18px;
                font-weight: bold;
                transition: all 0.2s;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            " onmouseover="this.style.background='#ffc107'; this.style.color='#000'" onmouseout="this.style.background='white'; this.style.color='#000'">
                <span style="font-size: 48px;">💳</span>
                <span style="font-size: 20px;">CRÉDITO</span>
                <span style="font-size: 16px; background: #ffc107; color: #000; padding: 8px 16px; border-radius: 6px;">Tecla 3</span>
            </button>

            <!-- PIX - Tecla 4 -->
            <button type="button" onclick="selecionarFormaPagamentoComValor('pix')" style="
                padding: 30px;
                border: 4px solid #17a2b8;
                background: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 18px;
                font-weight: bold;
                transition: all 0.2s;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            " onmouseover="this.style.background='#17a2b8'; this.style.color='white'" onmouseout="this.style.background='white'; this.style.color='#000'">
                <span style="font-size: 48px;">📱</span>
                <span style="font-size: 20px;">PIX</span>
                <span style="font-size: 16px; background: #17a2b8; color: white; padding: 8px 16px; border-radius: 6px;">Tecla 4</span>
            </button>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-danger" onclick="fecharModalFormaPagamento()" style="width: 100%; font-size: 16px;">Cancelar [ESC]</button>
        </div>
    </div>
</div>
