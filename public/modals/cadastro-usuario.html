<!-- Modal de Cadastro de Usuario -->
<div id="cadastroUsuarioModal" class="modal modal-nested">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 560px; max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h2>➕ Cadastrar Usuário</h2>
        </div>
        <form id="formCadastroUsuario" onsubmit="salvarUsuario(event)">
            <div style="display: grid; gap: 15px; padding: 20px;">
                <div class="form-group">
                    <label>Nome: *</label>
                    <input type="text" id="nomeUsuario" required placeholder="Nome completo">
                </div>

                <div class="form-group">
                    <label>E-mail: *</label>
                    <input type="email" id="emailUsuario" required placeholder="usuario@email.com">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Perfil: *</label>
                        <select id="roleUsuario" required>
                            <option value="operador" selected>Operador</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status:</label>
                        <select id="ativoUsuario">
                            <option value="true" selected>Ativo</option>
                            <option value="false">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha: *</label>
                    <input type="password" id="senhaUsuario" required minlength="6" placeholder="Minimo 6 caracteres">
                </div>

                <small style="color: #666;">A senha sera armazenada com hash de seguranca (bcrypt).</small>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn btn-success" style="flex: 1;">✓ Salvar Usuário</button>
                <button type="button" class="btn btn-danger" onclick="fecharModalAninhado(event, 'cadastroUsuarioModal')" style="flex: 1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>
