<!-- Modal de Cadastro de Conta a Pagar -->
<div id="cadastroContaPagarModal" class="modal modal-nested">
    <div class="modal-content" style="max-width: 600px;" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>➕ Nova Conta a Pagar</h2>
        </div>
        
        <form id="formCadastroContaPagar" onsubmit="salvarContaPagar(event)">
            <div class="form-group">
                <label>Descrição: *</label>
                <input 
                    type="text" 
                    id="descricaoContaPagar" 
                    placeholder="Ex: Aluguel, Energia, Fornecedor XYZ..."
                    required
                    style="width: 100%;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Valor: *</label>
                    <input 
                        type="text" 
                        id="valorContaPagar" 
                        placeholder="0,00"
                        required
                        style="font-size: 18px; font-weight: bold; text-align: right;">
                </div>
                
                <div class="form-group" id="wrapDataVencimento">
                    <label>Data de Vencimento: *</label>
                    <input 
                        type="date" 
                        id="dataVencimentoContaPagar"
                        required
                        style="width: 100%;">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Categoria:</label>
                    <select id="categoriaContaPagar" class="select-custom">
                        <option value="">-- Selecione --</option>
                        <!-- Categorias serão carregadas dinamicamente -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Fornecedor:</label>
                    <select id="fornecedorContaPagar" class="select-custom">
                        <option value="">-- Selecione --</option>
                        <!-- Fornecedores serão carregados dinamicamente -->
                    </select>
                </div>
            </div>
            
            <!-- NOVOS CAMPOS: Origem e Mês de Referência -->
            <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 4px solid #2196f3; margin-bottom: 15px;">
                <h4 style="margin: 0 0 15px 0; color: #1976d2;">💰 Controle Financeiro</h4>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group" style="margin: 0;">
                        <label>Pagar com: <span style="color: #dc3545;">*</span></label>
                        <select id="origemPagamentoContaPagar" class="select-custom" onchange="atualizarSaldoOrigemCadastro()" required>
                            <option value="">-- Selecione --</option>
                            <option value="reposicao">💵 Reposição</option>
                            <option value="lucro">💰 Lucro</option>
                        </select>
                        <small style="color: #666; display: block; margin-top: 5px;">
                            De onde sairá o pagamento
                        </small>
                    </div>
                    
                    <div class="form-group" style="margin: 0;">
                        <label>Mês de Referência: <span style="color: #dc3545;">*</span></label>
                        <input 
                            type="month" 
                            id="mesReferenciaContaPagar"
                            required
                            style="width: 100%;">
                        <small style="color: #666; display: block; margin-top: 5px;">
                            Mês do orçamento
                        </small>
                    </div>
                </div>
                
                <!-- Card de Saldo Disponível -->
                <div id="saldoDisponivelCadastro" style="display: none; margin-top: 15px; padding: 12px; background: white; border-radius: 6px; border: 2px solid #ddd;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: #333;">Saldo Disponível:</span>
                        <span id="valorSaldoDisponivelCadastro" style="font-size: 20px; font-weight: bold; color: #28a745;">R$ 0,00</span>
                    </div>
                    <div id="alertaSaldoNegativoCadastro" style="display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 4px;">
                        <strong style="color: #856404;">⚠️ Atenção:</strong>
                        <span style="color: #856404; display: block; margin-top: 5px;" id="mensagemAlertaCadastro">Saldo insuficiente neste mês.</span>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Observações:</label>
                <textarea 
                    id="observacoesContaPagar" 
                    rows="3" 
                    placeholder="Observações adicionais (opcional)"
                    style="width: 100%; resize: vertical;"></textarea>
            </div>

            <!-- RECORRÊNCIA -->
            <div style="background: #f3e5f5; padding: 15px; border-radius: 8px; border-left: 4px solid #9c27b0; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
                    <input type="checkbox" id="recorrenteContaPagar" onchange="toggleRecorrenciaForm()" style="width: 18px; height: 18px; cursor: pointer; accent-color: #9c27b0;">
                    <label for="recorrenteContaPagar" style="font-size: 15px; font-weight: 600; color: #6a1b9a; cursor: pointer; margin: 0;">🔄 Conta Recorrente</label>
                </div>
                <small style="color: #888; display: block; margin-left: 28px;">Cria automaticamente esta conta em múltiplos meses.</small>

                <div id="secaoRecorrencia" style="display: none; margin-top: 15px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                        <div class="form-group" style="margin: 0;">
                            <label>Frequência: <span style="color: #dc3545;">*</span></label>
                            <select id="frequenciaRecorrencia" class="select-custom" onchange="atualizarPreviewRecorrencia()">
                                <option value="mensal">Mensal</option>
                                <option value="bimestral">Bimestral</option>
                                <option value="trimestral">Trimestral</option>
                                <option value="semestral">Semestral</option>
                                <option value="anual">Anual</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Data Início: <span style="color: #dc3545;">*</span></label>
                            <input type="date" id="dataInicioRecorrencia" style="width: 100%;" onchange="atualizarPreviewRecorrencia()">
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Data Fim: <span style="color: #dc3545;">*</span></label>
                            <input type="date" id="dataFimRecorrencia" style="width: 100%;" onchange="atualizarPreviewRecorrencia()">
                        </div>
                    </div>
                    <div id="previewRecorrencia" style="display: none; margin-top: 12px; padding: 10px; background: white; border-radius: 6px; border: 1px solid #ce93d8; font-size: 13px; color: #6a1b9a;">
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn btn-success" style="flex: 1;">
                    ✓ Cadastrar
                </button>
                <button type="button" class="btn btn-danger" onclick="fecharModalAninhado(event, 'cadastroContaPagarModal')" style="flex: 1;">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>
