<!-- Modal de Finalização -->
<div id="finalizacaoModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2>💳 Finalizar Venda</h2>
        </div>
        <div class="total-section" style="margin-bottom: 20px;">
            <div class="total-row">
                <span class="total-label">Subtotal:</span>
                <span class="total-value" id="subtotalVenda" style="font-size: 20px; color: #666;">R$ 0,00</span>
            </div>
            <div class="total-row">
                <span class="total-label">Desc. Manual Itens:</span>
                <span class="total-value" id="descontoItensAplicado" style="font-size: 18px; color: #dc3545;">- R$ 0,00</span>
            </div>
            <div class="total-row">
                <span class="total-label">Desc. Manual Total:</span>
                <span class="total-value" id="descontoTotalAplicado" style="font-size: 18px; color: #dc3545;">- R$ 0,00</span>
            </div>
            
            <div class="total-row">
                <span class="total-label">TOTAL A PAGAR:</span>
                <span class="total-value" id="totalFinal" style="font-size: 32px; color: #28a745;">R$ 0,00</span>
            </div>
            <div class="total-row">
                <span class="total-label">Valor Pago:</span>
                <span class="total-value" id="totalPago" style="font-size: 20px; color: #007bff;">R$ 0,00</span>
            </div>
            <div class="total-row">
                <span class="total-label">Falta Pagar:</span>
                <span class="total-value" id="faltaPagar" style="font-size: 20px; color: #dc3545;">R$ 0,00</span>
            </div>
        </div>

        <div style="background: #fff8e1; border: 1px solid #ffe082; padding: 14px; border-radius: 8px; margin-bottom: 15px;">
            <div style="font-size: 16px; font-weight: 700; color: #8a6d3b; margin-bottom: 10px;">Desconto Manual</div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; align-items: center; margin-bottom: 8px;">
                <select id="descontoItemAlvo" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;"></select>
                <select id="descontoItemTipo" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                    <option value="valor">R$</option>
                    <option value="percentual">%</option>
                </select>
                <input id="descontoItemValor" type="number" step="0.01" min="0" placeholder="Valor" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                <button type="button" onclick="aplicarDescontoManualItem()" class="btn btn-success" style="padding: 10px 12px;">Aplicar Item</button>
                <button type="button" onclick="limparDescontoManualItem()" class="btn btn-danger" style="padding: 10px 12px;">Limpar</button>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; align-items: center;">
                <select id="descontoTotalTipo" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                    <option value="valor">R$</option>
                    <option value="percentual">%</option>
                </select>
                <input id="descontoTotalValor" type="number" step="0.01" min="0" placeholder="Valor" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                <button type="button" onclick="aplicarDescontoManualTotal()" class="btn btn-success" style="padding: 10px 12px;">Aplicar Total</button>
                <button type="button" onclick="limparDescontoManualTotal()" class="btn btn-danger" style="padding: 10px 12px;">Limpar</button>
            </div>
        </div>

        <!-- Adicionar Forma de Pagamento -->
        <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 15px;">
            <!-- Input de Valor -->
            <div class="form-group" style="margin: 0;">
                <label style="font-size: 18px; font-weight: bold; color: #333; margin-bottom: 12px; display: block;">💰 Digite o Valor (R$):</label>
                <input type="text" id="valorPagamento" placeholder="0,00" style="padding: 20px; border: 4px solid #667eea; border-radius: 10px; width: 100%; font-size: 28px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <p style="margin-top: 12px; text-align: center; color: #666; font-size: 14px;">Pressione <strong>Enter</strong> para selecionar a forma de pagamento</p>
            </div>
        </div>

        <!-- Lista de Pagamentos -->
        <div id="listaPagamentos" style="margin-bottom: 15px; max-height: 200px; overflow-y: auto;">
            <!-- Pagamentos serão inseridos aqui -->
        </div>

        <!-- Troco (só aparece se pagar em dinheiro) -->
        <div id="trocoSection" style="display: none; background: #d4edda; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 18px; font-weight: bold; color: #155724;">💰 TROCO:</span>
                <span id="troco" style="font-size: 24px; font-weight: bold; color: #155724;">R$ 0,00</span>
            </div>
        </div>

        <div class="modal-actions">
            <button type="button" class="btn btn-success" onclick="confirmarVendaFinal()" id="btnConfirmarVenda" style="flex: 1; font-size: 18px; padding: 16px; font-weight: 800;" disabled>✓ CONFIRMAR VENDA [Enter]</button>
            <button type="button" class="btn btn-danger" onclick="fecharModal('finalizacaoModal')" style="flex: 1; font-size: 16px; padding: 16px;">Cancelar [ESC]</button>
        </div>
    </div>
</div>
